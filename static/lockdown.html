<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🔴 LOCKDOWN ACTIVE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #ff2222;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .container { max-width: 520px; padding: 2rem; }
    .icon { font-size: 5rem; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    h1 { font-size: 2.2rem; margin: 1rem 0 0.5rem; letter-spacing: 0.1em; }
    p  { font-size: 1rem; color: #cc0000; margin: 0.5rem 0; line-height: 1.6; }
    .timer {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1.2rem;
      border: 1px solid #ff2222;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #ff4444;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔴</div>
    <h1>LOCKDOWN ACTIVE</h1>
    <p>This server is currently in emergency lockdown.</p>
    <p>All services are suspended.<br>All data has been permanently wiped.</p>
    <p>Access is restricted until the administrator deactivates lockdown.</p>
    <div class="timer" id="ts">—</div>
  </div>
  <script>
    function updateTs() {
      document.getElementById('ts').textContent =
        new Date().toUTCString();
    }
    updateTs();
    setInterval(updateTs, 1000);
  </script>
</body>
</html>
