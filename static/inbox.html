<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>secureChat — One-Time Inbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
    }
    h1 { font-size: 1.4rem; margin-bottom: .5rem; }
    p  { color: #888; font-size: .9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    textarea {
      width: 100%;
      min-height: 120px;
      background: #111;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: .75rem;
      font-size: 1rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #4a9eff; }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: .75rem;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled { background: #2a5a99; cursor: not-allowed; }
    .status { margin-top: 1rem; padding: .75rem; border-radius: 8px; font-size: .9rem; display: none; }
    .status.ok  { background: #1a3a1a; border: 1px solid #2d6a2d; color: #6fcf6f; display: block; }
    .status.err { background: #3a1a1a; border: 1px solid #6a2d2d; color: #cf6f6f; display: block; }
    .char-count { text-align: right; font-size: .75rem; color: #555; margin-top: .25rem; }
    .char-count.warn { color: #cf9f2f; }
  </style>
</head>
<body>
<div class="card">
  <h1>📬 One-Time Inbox</h1>
  <p>
    Send a single message to the recipient. Once sent, this inbox cannot
    receive another message. The recipient can only read it once — after that
    the message is permanently deleted.
  </p>
  <textarea id="msg" placeholder="Type your message or one-time code here…" maxlength="4096"></textarea>
  <div class="char-count"><span id="cc">0</span> / 4096</div>
  <button id="send-btn">Send Message →</button>
  <div id="status" class="status"></div>
</div>

<script>
  const TOKEN = '__INBOX_TOKEN__';
  const MAX   = 4096;

  const msgEl    = document.getElementById('msg');
  const ccEl     = document.getElementById('cc');
  const btn      = document.getElementById('send-btn');
  const statusEl = document.getElementById('status');

  msgEl.addEventListener('input', () => {
    const n = msgEl.value.length;
    ccEl.textContent = n;
    ccEl.parentElement.className = 'char-count' + (n > MAX * 0.9 ? ' warn' : '');
  });

  btn.addEventListener('click', async () => {
    const message = msgEl.value.trim();
    if (!message) { showStatus('err', 'Please enter a message before sending.'); return; }
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      const resp = await fetch(`/inbox/${encodeURIComponent(TOKEN)}/drop`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      if (resp.ok) {
        showStatus('ok', '✅ Message delivered! The recipient can now read it once.');
        msgEl.disabled = true;
        btn.textContent = 'Message sent';
      } else {
        const text = await resp.text().catch(() => resp.statusText);
        if (resp.status === 409) {
          showStatus('err', '⚠️ This inbox has already received a message.');
        } else if (resp.status === 410) {
          showStatus('err', '⏰ This inbox has expired.');
        } else {
          showStatus('err', `Error: ${text || resp.statusText}`);
          btn.disabled = false;
          btn.textContent = 'Send Message →';
        }
      }
    } catch (err) {
      showStatus('err', `Network error: ${err.message}`);
      btn.disabled = false;
      btn.textContent = 'Send Message →';
    }
  });

  function showStatus(type, msg) {
    statusEl.className = 'status ' + type;
    statusEl.textContent = msg;
  }
</script>
</body>
</html>
