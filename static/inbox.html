<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>secureChat — Send to Inbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 2rem;
      max-width: 540px;
      width: 100%;
    }
    h1 { font-size: 1.4rem; margin-bottom: .4rem; }
    .subtitle { color: #888; font-size: .88rem; margin-bottom: 1.2rem; line-height: 1.5; }
    .address-box {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: .6rem .75rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .address-box code {
      flex: 1;
      font-family: monospace;
      font-size: .9rem;
      color: #80d4ff;
      word-break: break-all;
    }
    .copy-btn {
      flex-shrink: 0;
      background: #2a4a6a;
      color: #80d4ff;
      border: none;
      border-radius: 6px;
      padding: .3rem .7rem;
      cursor: pointer;
      font-size: .8rem;
      margin-top: 0;
      width: auto;
      font-weight: 600;
    }
    .copy-btn:hover { background: #3a5a7a; }
    .timer {
      font-size: .82rem;
      color: #888;
      margin-bottom: 1.2rem;
    }
    .timer span { color: #e0c060; font-weight: 600; }
    .timer.urgent span { color: #e06060; }
    textarea {
      width: 100%;
      min-height: 120px;
      background: #111;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      padding: .75rem;
      font-size: 1rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #4a9eff; }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: .75rem;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled { background: #2a5a99; cursor: not-allowed; }
    .char-count { text-align: right; font-size: .75rem; color: #555; margin-top: .25rem; }
    .char-count.warn { color: #cf9f2f; }
    .sent-count { font-size: .8rem; color: #6fcf6f; margin-top: .6rem; text-align: center; }
    .status { margin-top: 1rem; padding: .75rem; border-radius: 8px; font-size: .9rem; display: none; }
    .status.ok  { background: #1a3a1a; border: 1px solid #2d6a2d; color: #6fcf6f; display: block; }
    .status.err { background: #3a1a1a; border: 1px solid #6a2d2d; color: #cf6f6f; display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1>📬 Send to Inbox</h1>
  <p class="subtitle">
    Send a message to this inbox. Messages are held until the inbox expires — you can
    send as many messages as needed and the recipient can read them at any time.
  </p>

  <p style="font-size:.82rem;color:#888;margin-bottom:.4rem">Inbox address</p>
  <div class="address-box">
    <code id="addr">__INBOX_ADDRESS__</code>
    <button type="button" class="copy-btn" id="copy-addr-btn">Copy</button>
  </div>

  <p class="timer" id="timer">Expires in <span id="countdown">–</span></p>

  <textarea id="msg" placeholder="Type your message here…" maxlength="65536"></textarea>
  <div class="char-count"><span id="cc">0</span> / 65536</div>
  <button id="send-btn">Send Message →</button>
  <div class="sent-count" id="sent-count" style="display:none"></div>
  <div id="status" class="status"></div>
</div>

<script>
  const TOKEN      = '__INBOX_TOKEN__';
  const EXPIRES_AT = __INBOX_EXPIRES_AT__;   // injected unix timestamp (float)
  const MAX        = 65536;
  let   _sentCount = 0;

  /* ── Address copy ── */
  document.getElementById('copy-addr-btn').addEventListener('click', () => {
    const addr = document.getElementById('addr').textContent;
    navigator.clipboard.writeText(addr).then(() => {
      const b = document.getElementById('copy-addr-btn');
      b.textContent = 'Copied!';
      setTimeout(() => { b.textContent = 'Copy'; }, 2000);
    }).catch(() => {
      const r = document.createRange();
      r.selectNodeContents(document.getElementById('addr'));
      const s = window.getSelection();
      if (s) { s.removeAllRanges(); s.addRange(r); }
    });
  });

  /* ── Countdown timer ── */
  function updateCountdown() {
    const secs = Math.max(0, Math.round(EXPIRES_AT - Date.now() / 1000));
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    const el = document.getElementById('countdown');
    const timerEl = document.getElementById('timer');
    if (h > 0) el.textContent = `${h}h ${m}m`;
    else if (m > 0) el.textContent = `${m}m ${s}s`;
    else el.textContent = `${s}s`;
    timerEl.className = 'timer' + (secs < 120 ? ' urgent' : '');
    if (secs === 0) {
      el.textContent = 'expired';
      document.getElementById('send-btn').disabled = true;
      showStatus('err', '⏰ This inbox has expired.');
    }
  }
  updateCountdown();
  const _tick = setInterval(updateCountdown, 1000);

  /* ── Char counter ── */
  const msgEl = document.getElementById('msg');
  msgEl.addEventListener('input', () => {
    const n = msgEl.value.length;
    document.getElementById('cc').textContent = n;
    document.querySelector('.char-count').className =
      'char-count' + (n > MAX * 0.9 ? ' warn' : '');
  });

  /* ── Send ── */
  document.getElementById('send-btn').addEventListener('click', async () => {
    const message = msgEl.value.trim();
    if (!message) { showStatus('err', 'Please enter a message before sending.'); return; }
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      const resp = await fetch(`/inbox/${encodeURIComponent(TOKEN)}/drop`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      if (resp.ok) {
        _sentCount++;
        msgEl.value = '';
        document.getElementById('cc').textContent = '0';
        const countEl = document.getElementById('sent-count');
        countEl.style.display = '';
        countEl.textContent = `✅ ${_sentCount} message${_sentCount !== 1 ? 's' : ''} sent to this inbox`;
        showStatus('ok', '✅ Message delivered!');
      } else {
        const text = await resp.text().catch(() => resp.statusText);
        if (resp.status === 410) showStatus('err', '⏰ This inbox has expired.');
        else showStatus('err', `Error: ${text || resp.statusText}`);
      }
    } catch (err) {
      showStatus('err', `Network error: ${err.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Message →';
    }
  });

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = msg;
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }
</script>
</body>
</html>
